    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <title>AR Album Hologram</title>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js?v=' + Date.now())
          .then(reg => reg.update());
        // Reload otomatis sekali saat SW baru aktif (cache baru ter-clear)
        navigator.serviceWorker.addEventListener('message', function(e) {
          if (e.data === 'SW_UPDATED' && !sessionStorage.getItem('sw-reloaded')) {
            sessionStorage.setItem('sw-reloaded', '1');
            window.location.reload();
          }
        });
      }
    </script>

    <!-- Three.js dan MindAR di-import langsung oleh React (tidak perlu script tag) -->

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #root { width: 100%; height: 100%; }
    </style>

    <link rel="stylesheet" crossorigin href="/ar-album-hologram/assets/index-F20xmS2B.css">
